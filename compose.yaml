name: ${COMPOSE_PROJECT_NAME:-db-local-stack}

services:
  postgres:
    image: pgvector/pgvector:0.8.4-pg17
    container_name: ${POSTGRES_CONTAINER_NAME:-db-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-langgraph_app}
      POSTGRES_USER: ${POSTGRES_USER:-langgraph_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_2026}
    ports:
      - "${DB_HOST_BIND:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${POSTGRES_INITDB_DIR:-./initdb/postgres}:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - db_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${PGADMIN_CONTAINER_NAME:-db-pgadmin}
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change_me_pgadmin_2026}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    ports:
      - "${DB_HOST_BIND:-0.0.0.0}:${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ${PGADMIN_SERVERS_JSON:-./generated/pgadmin/servers.json}:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db_net

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-db-redis}
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_redis_2026}
    command:
      - sh
      - -c
      - redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes
    ports:
      - "${DB_HOST_BIND:-0.0.0.0}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - db_net

  redisinsight:
    image: redis/redisinsight:latest
    container_name: ${REDISINSIGHT_CONTAINER_NAME:-db-redisinsight}
    restart: unless-stopped
    environment:
      RI_APP_HOST: 0.0.0.0
      RI_APP_PORT: 5540
      RI_ACCEPT_TERMS_AND_CONDITIONS: "true"
      RI_DATABASE_MANAGEMENT: "true"
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: 6379
      RI_REDIS_ALIAS: db-redis
      RI_REDIS_USERNAME: default
      RI_REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_redis_2026}
      RI_REDIS_TLS: "false"
      RI_REDIS_DB: 0
    ports:
      - "${DB_HOST_BIND:-0.0.0.0}:${REDISINSIGHT_PORT:-5540}:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - db_net

  neo4j:
    image: neo4j:5-community
    container_name: ${NEO4J_CONTAINER_NAME:-db-neo4j}
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-change_me_neo4j_2026}"
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512m}
    ports:
      - "${DB_HOST_BIND:-0.0.0.0}:${NEO4J_HTTP_PORT:-7474}:7474"
      - "${DB_HOST_BIND:-0.0.0.0}:${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test:
        - CMD-SHELL
        - |
          neo4j_user="$${NEO4J_AUTH%%/*}";
          neo4j_pass="$${NEO4J_AUTH#*/}";
          cypher-shell -u "$$neo4j_user" -p "$$neo4j_pass" "RETURN 1;" >/dev/null 2>&1
      interval: ${NEO4J_HEALTHCHECK_INTERVAL:-15s}
      timeout: ${NEO4J_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${NEO4J_HEALTHCHECK_RETRIES:-40}
      start_period: ${NEO4J_HEALTHCHECK_START_PERIOD:-120s}
    networks:
      - db_net

  minio:
    image: quay.io/minio/minio:latest
    container_name: ${MINIO_CONTAINER_NAME:-db-minio}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio_2026}
    ports:
      - "${DB_HOST_BIND:-0.0.0.0}:${MINIO_API_PORT:-9000}:9000"
      - "${DB_HOST_BIND:-0.0.0.0}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - db_net

  dashboard:
    image: busybox:1.37-musl
    container_name: ${DASHBOARD_CONTAINER_NAME:-db-dashboard}
    restart: unless-stopped
    command: ["httpd", "-f", "-v", "-p", "8080", "-h", "/www"]
    ports:
      - "${DASHBOARD_HOST_BIND:-127.0.0.1}:${DASHBOARD_PORT:-8003}:8080"
    volumes:
      - ${DASHBOARD_WWW_DIR:-./www}:/www:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8003/index.html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - db_net

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: ${MINIO_INIT_CONTAINER_NAME:-db-minio-init}
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio_2026}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-langgraph-app}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc mb --ignore-existing "local/$$MINIO_DEFAULT_BUCKET"
        mc anonymous set none "local/$$MINIO_DEFAULT_BUCKET"
        echo "MinIO bucket ready: $$MINIO_DEFAULT_BUCKET"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - db_net

networks:
  db_net:
    name: ${DB_NETWORK_NAME:-db-local-net}
    driver: bridge

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-db-postgres-data}
  pgadmin_data:
    name: ${PGADMIN_VOLUME_NAME:-db-pgadmin-data}
  redis_data:
    name: ${REDIS_VOLUME_NAME:-db-redis-data}
  redisinsight_data:
    name: ${REDISINSIGHT_VOLUME_NAME:-db-redisinsight-data}
  neo4j_data:
    name: ${NEO4J_DATA_VOLUME_NAME:-db-neo4j-data}
  neo4j_logs:
    name: ${NEO4J_LOGS_VOLUME_NAME:-db-neo4j-logs}
  neo4j_import:
    name: ${NEO4J_IMPORT_VOLUME_NAME:-db-neo4j-import}
  neo4j_plugins:
    name: ${NEO4J_PLUGINS_VOLUME_NAME:-db-neo4j-plugins}
  minio_data:
    name: ${MINIO_VOLUME_NAME:-db-minio-data}
