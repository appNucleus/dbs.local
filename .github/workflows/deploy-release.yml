name: Deploy release to DB server

on:
  push:
    branches:
      - release

permissions:
  contents: read

concurrency:
  group: db-production-release
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Docker DB stack

    runs-on:
      - self-hosted
      - Linux
      - X64
      - dbs-prod

    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out release commit
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Configure deployment environment file
        run: |
          set -euo pipefail

          {
            echo "DEPLOY_ENV_FILE=$HOME/.config/db.local/runtime.env"
            echo "ROLLBACK_STATE_DIR=$RUNNER_TEMP/db-local-rollback"
          } >> "$GITHUB_ENV"

      - name: Verify deployment prerequisites
        run: |
          set -euo pipefail

          echo "Checking shell-script syntax..."
          for script in scripts/*.sh; do
            echo "Checking: $script"
            bash -n "$script"
          done

          echo "Checking server prerequisites..."
          bash ./scripts/verify-server.sh

          echo "All deployment prerequisites passed."

      - name: Initialize persistent runtime environment
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$DEPLOY_ENV_FILE")"

          if [[ ! -f "$DEPLOY_ENV_FILE" ]]; then
            install -m 600 .env.example "$DEPLOY_ENV_FILE"
            echo "Created persistent runtime environment file: $DEPLOY_ENV_FILE"
          else
            chmod 600 "$DEPLOY_ENV_FILE" 2>/dev/null || true
            echo "Using persistent runtime environment file: $DEPLOY_ENV_FILE"
          fi

          set_runtime_env_value_if_missing() {
            local key="$1"
            local value="$2"
            local file="$3"

            if ! grep -qE "^${key}=" "$file"; then
              printf '\n%s=%s\n' "$key" "$value" >> "$file"
            fi
          }

          set_runtime_env_value() {
            local key="$1"
            local value="$2"
            local file="$3"

            if grep -qE "^${key}=" "$file"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "$file"
            else
              printf '\n%s=%s\n' "$key" "$value" >> "$file"
            fi
          }

          set_runtime_env_value_if_missing ACTIONS_ROOT '${HOME}/actions_db.local' "$DEPLOY_ENV_FILE"
          set_runtime_env_value_if_missing BACKUP_ROOT '${HOME}/backup_db.local' "$DEPLOY_ENV_FILE"
          set_runtime_env_value_if_missing COMPOSE_WAIT_TIMEOUT '600' "$DEPLOY_ENV_FILE"
          set_runtime_env_value_if_missing DEPLOY_LOG_TAIL '200' "$DEPLOY_ENV_FILE"
          set_runtime_env_value_if_missing RUN_MINIO_INIT 'true' "$DEPLOY_ENV_FILE"

          set_runtime_env_value DB_HOST_BIND '0.0.0.0' "$DEPLOY_ENV_FILE"
          set_runtime_env_value DASHBOARD_HOST_BIND '127.0.0.1' "$DEPLOY_ENV_FILE"
          set_runtime_env_value DASHBOARD_PORT '8003' "$DEPLOY_ENV_FILE"

          set -a
          # shellcheck disable=SC1090
          source "$DEPLOY_ENV_FILE"
          set +a

          ACTIONS_ROOT="${ACTIONS_ROOT:-$HOME/actions_db.local}"
          BACKUP_ROOT="${BACKUP_ROOT:-$HOME/backup_db.local}"
          COMPOSE_WAIT_TIMEOUT="${COMPOSE_WAIT_TIMEOUT:-600}"
          DEPLOY_LOG_TAIL="${DEPLOY_LOG_TAIL:-200}"
          RUN_MINIO_INIT="${RUN_MINIO_INIT:-true}"

          mkdir -p "$ACTIONS_ROOT" "$BACKUP_ROOT"

          {
            echo "ACTIONS_ROOT=$ACTIONS_ROOT"
            echo "BACKUP_ROOT=$BACKUP_ROOT"
            echo "COMPOSE_WAIT_TIMEOUT=$COMPOSE_WAIT_TIMEOUT"
            echo "DEPLOY_LOG_TAIL=$DEPLOY_LOG_TAIL"
            echo "RUN_MINIO_INIT=$RUN_MINIO_INIT"
          } >> "$GITHUB_ENV"

          echo "Actions root: $ACTIONS_ROOT"
          echo "Backup root:  $BACKUP_ROOT"

      - name: Validate candidate Compose configuration
        run: |
          set -euo pipefail

          bash ./scripts/generate-pgadmin-config.sh

          docker compose \
            --env-file "$DEPLOY_ENV_FILE" \
            config \
            >/dev/null

          echo "Docker Compose configuration is valid."

      - name: Prepare rollback point
        id: prepare_rollback
        run: |
          set -euo pipefail
          bash ./scripts/prepare-rollback.sh

      - name: Deploy candidate DB stack
        run: |
          set -euo pipefail
          bash ./scripts/start.sh --wait

      - name: Run candidate smoke test
        run: |
          set -euo pipefail
          bash ./scripts/smoke-test.sh candidate

      - name: Replace successful deployment backup
        run: |
          set -euo pipefail
          bash ./scripts/create-success-backup.sh

      - name: Clean dangling images only
        if: ${{ success() }}
        run: |
          set -u

          # Safe cleanup only. Never use --volumes for this DB stack.
          if ! docker image prune --force; then
            echo "::warning::The deployment succeeded, but dangling Docker image cleanup failed."
          fi

      - name: Roll back failed deployment
        id: rollback
        if: ${{ failure() && !cancelled() && steps.prepare_rollback.outcome == 'success' }}
        run: |
          set -euo pipefail
          bash ./scripts/rollback-release.sh

      - name: Explain why rollback was not attempted
        if: ${{ failure() && !cancelled() && steps.prepare_rollback.outcome != 'success' }}
        run: |
          echo "::notice::Rollback was not attempted because the workflow failed before a rollback point was successfully prepared."
          echo "The previously running deployment should not have been modified."

      - name: Show final deployment status
        if: ${{ always() }}
        run: |
          set +e

          deploy_env_file="${DEPLOY_ENV_FILE:-$HOME/.config/db.local/runtime.env}"
          backup_root="${BACKUP_ROOT:-$HOME/backup_db.local}"

          echo "Docker Compose status:"
          docker compose \
            --env-file "$deploy_env_file" \
            ps

          echo
          echo "Recent Docker Compose logs:"
          docker compose \
            --env-file "$deploy_env_file" \
            logs \
            --no-color \
            --tail=120

          echo
          echo "Backup directories:"
          find "$backup_root" \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -printf '%f\n' \
            2>/dev/null |
            sort

      - name: Write deployment summary
        if: ${{ always() }}
        env:
          FINAL_JOB_STATUS: ${{ job.status }}
          PREPARE_ROLLBACK_OUTCOME: ${{ steps.prepare_rollback.outcome }}
          ROLLBACK_STEP_OUTCOME: ${{ steps.rollback.outcome }}
        run: |
          set -euo pipefail

          backup_root="${BACKUP_ROOT:-$HOME/backup_db.local}"

          {
            echo "## DB deployment"
            echo
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Workflow result: **$FINAL_JOB_STATUS**"
            echo "- Rollback point preparation: **${PREPARE_ROLLBACK_OUTCOME:-not run}**"
            echo "- Rollback step: **${ROLLBACK_STEP_OUTCOME:-not run}**"
            echo "- Rollback detail: **${ROLLBACK_RESULT:-not required}**"
            echo "- Runtime env file: \`$DEPLOY_ENV_FILE\`"
            echo "- Actions root: \`${ACTIONS_ROOT:-$HOME/actions_db.local}\`"
            echo "- Backup root: \`$backup_root\`"
            echo

            if [[ "$FINAL_JOB_STATUS" == "success" ]]; then
              echo "The candidate DB stack passed Compose health checks and smoke tests."
              echo
              echo "The previous deployment backup was replaced with the new successful-deployment backup."
              echo
              echo "Docker volumes were preserved."
            else
              echo "The workflow remains failed so GitHub displays a red failure status."
              echo
              echo "Automatic rollback was attempted only when a valid rollback point had been prepared."
              echo
              echo "Docker volumes were preserved. Review the failed step and final Docker logs above."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
